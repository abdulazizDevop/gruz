<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>DoorMan — Учёт заказов</title>
    <meta name="description" content="Система учёта торговли входными металлическими дверями" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/doorman-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebaseinstallations.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

    <meta name="theme-color" content="#1c2a3a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DoorMan" />
    <meta name="format-detection" content="telephone=no" />

    <style>
      html, body { margin: 0; padding: 0; background: #0a0a0c; }
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0c;
        z-index: 9999;
        gap: 24px;
      }
      #initial-loader img {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      }
      #initial-loader .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(232, 222, 140, 0.18);
        border-top-color: #e8de8c;
        border-radius: 50%;
        animation: il-spin 0.8s linear infinite;
      }
      #initial-loader .label {
        font-family: Georgia, serif;
        font-style: italic;
        font-size: 20px;
        color: #e8de8c;
        letter-spacing: 0.02em;
      }
      @keyframes il-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <img src="/doorman-logo.png" alt="DoorMan" />
        <div class="label">DoorMan</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
